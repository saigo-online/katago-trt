# KataGo 9x9 — CGOS strength config. TensorRT-RTX FP8 backend (the +108 Elo wall-clock engine),
# pondering on, no exploration noise, LCB selection. The CGOS clock bounds search via time_settings.

# logging
logDir = /home/taro/code/saigo.online/engines/katago-trt/cgos/logs
logToStderr = false
logAllGTPCommunication = false
logSearchInfo = false
logTimeStamp = false

# rules — CGOS 9x9 = Tromp-Taylor (area, positional superko), server sends komi 7.0
rules = tromp-taylor

# --- backend: TensorRT-RTX, FP8 trunk (b28 net via -model) ---
trtDisableOnnx = true
useFP16 = true
trtTrunkPrecision = fp8

# --- search: strong, batch-friendly for FP8 ---
numSearchThreads = 32
nnMaxBatchSize = 32
numNNServerThreadsPerModel = 1
nnCacheSizePowerOfTwo = 22
nnMutexPoolSizePowerOfTwo = 16
maxVisits = 1000000000
maxPlayouts = 1000000000

# --- pondering: think on the opponent's clock, reuse the tree ---
ponderingEnabled = false

# --- best-move selection: deterministic + LCB, use symmetries ---
chosenMoveTemperatureEarly = 0.0
chosenMoveTemperature = 0.0
useLcbForSelection = true
rootSymmetryPruning = true

# --- time management: KataGo smart TM + network lag safety for CGOS ---
lagBuffer = 1.0

# --- resignation: allow, but conservative on 9x9 ---
allowResignation = true
resignThreshold = -0.98
resignConsecTurns = 6
